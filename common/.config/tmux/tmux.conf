# -- Panes --------------------------------------------------------------------
# split panes
bind -n M-i split-window -h
bind -n M-- split-window -v
# close panes
bind -n M-c kill-pane
# switch panes
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D



# -- Windows ------------------------------------------------------------------
bind -n M-t new-window
bind -n M-h previous-window
bind -n M-l next-window

# -- Clients ---------
bind -n M-k switch-client -p
bind -n M-j switch-client -n


# -- Other Binds --------------------------------------------------------------
bind -n M-s run-shell 'tmux choose-session'
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded!"
bind -n M-d detach

# necessary unbinds
unbind '"'
unbind %



# -- Basic Settings -----------------------------------------------------------
# Address vim mode switching delay
# http://superuser.com/a/252717/65504
set  -g history-limit 50000
set  -g allow-rename off
set  -g display-time 1500
set  -s escape-time 0
set  -g base-index 1
set  -g pane-base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on
set  -g default-terminal "screen-256color"
set  -g focus-events on
set  -g extended-keys on
set  -g extended-keys-format csi-u
set  -g mouse on
set  -g mouse on
set  -g @mighty-scroll-interval 2
set  -g @mighty-scroll-by-line 'man fzf'
set  -g @mighty-scroll-select-pane on


# -- Design Tweaks -------------------------------------------------------------
# don't do anything when a 'bell' rings
# set  -g visual-activity  off
# set  -g visual-bell      off
# set  -g visual-silence   off
# setw -g monitor-activity off
# set  -g bell-action      none



# -- Status Bars ---------------------------------------------------------------
set  -g status-position bottom
# set  -g status-position[0] bottom
# set  -g status-position[1] top
set  -g status-justify left
set  -g status-interval 5



# set -g @batt_color_charge_primary_tier7 'bg=#0088ff'


# -- Own Styles ----------------------------------------------------------------
### Nordyan - Dark
set  -g status-style  'fg=#eceff4, bg=#3b4253'
set  -g status-left   "#[fg=#2e3440, bg=#80a0c2]  #(~/.config/tmux/session-status.sh)  #[fg=#eceff4, bg=#3b4253]|"
set  -g status-left-length 50

setw -g window-status-format          "#[fg=#86c0d1, bg=#4c566b]  #I  "
setw -g window-status-separator       "#[fg=#eceff4, bg=#3b4253, bold]|"
setw -g window-status-current-format   "#[fg=#2e3440 bg=#86c0d1, bold]  #I  "

set  -g status-right "#{battery_color_status_fg}[#{battery_color_fg}BAT #{battery_color_charge_fg}#{battery_percentage}#{battery_color_status_fg}] #[fg=#3b4253, bg=#80a0c2]  %d.%m  %H:%M  "
set  -g status-right-length 250
set  -g status-right-style  'fg=#eceff4 bg=#3b4253'




# panes
set  -g pane-border-style         'fg=#4c566b'
set  -g pane-active-border-style  'fg=#86c0d1'
set  -g pane-border-indicators    colour          # off, colour, arrows, both
set  -g pane-border-lines         heavy           # single, double, heavy, simple, number

