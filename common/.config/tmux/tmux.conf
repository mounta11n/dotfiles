# -- Panes --------------------------------------------------------------------
# split panes
# bind -n M-1 split-window -h
bind -n M-i split-window -h
bind -n M-- split-window -v
# close panes
bind -n M-c kill-pane
# switch panes
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D



# -- Windows ------------------------------------------------------------------
# create window
bind -n M-t new-window
# switch window
bind -n M-ö previous-window
bind -n M-ä next-window

# -- Clients ---------
bind -n M-p switch-client -p
bind -n M-ü switch-client -n


# -- Other Binds --------------------------------------------------------------
# choose session
bind -n M-s run-shell 'tmux choose-session'
# reload config
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"
# detach
bind -n M-d detach



# -- Misc ---------------------------------------------------------------------
# necessary unbinds
unbind '"'
unbind %



# -- Basic Settings -----------------------------------------------------------
# Address vim mode switching delay
# http://superuser.com/a/252717/65504
set  -g history-limit 50000
set-option -g allow-rename off
set  -g display-time 1500
set  -s escape-time 0
set  -g base-index 1
set  -g pane-base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
set  -g default-terminal "screen-256color"
set  -g focus-events on
set  -g extended-keys on
set  -g extended-keys-format csi-u
set  -g mouse on


# -- Design Tweaks ------------------------------------------------------------
# don't do anything when a 'bell' rings
# set  -g visual-activity  off
# set  -g visual-bell      off
# set  -g visual-silence   off
# setw -g monitor-activity off
# set  -g bell-action      none



# -- Status Bar ---------------------------------------------------------------
set  -g status-position bottom
set  -g status-justify left
set  -g status-interval 5
set  -g status-left "#(~/.config/tmux/session-status.sh) | #{ram_percentage} "
set  -g status-left-length 50
set  -g status-right "%Y-%m-%d %H:%M"
set  -g status-right-length 80



